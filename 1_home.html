<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 지갑 — 용돈기록장 개선</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
:root {
  --green: #03C75A;
  --green-dark: #028A3E;
  --green-light: #E8FAF0;
  --purple: #7C3AED;
  --purple-light: #F3ECFD;
  --red: #FF4040;
  --bg: #F3F5F7;
  --surface: #FFFFFF;
  --text-primary: #1A1A1A;
  --text-secondary: #767676;
  --text-tertiary: #929294;
  --border: #EDEFF2;
  --divider: #F3F5F7;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
  background: #D8D8D8;
  min-height: 100vh;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 24px 0 48px;
}
/* Phone Frame */
.frame {
  width: 375px;
  background: var(--bg);
  border-radius: 44px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.12);
}
/* Status Bar */
.sb {
  height: 44px; background: var(--surface);
  display: flex; align-items: center;
  padding: 0 21px; position: relative;
}
.sb-time {
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  position: absolute; left: 21px; top: 50%; transform: translateY(-50%);
}
.sb-icons {
  position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 5px;
}
/* NPay Header */
.npay-header {
  height: 56px; background: var(--surface);
  display: flex; align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--divider);
}
.npay-header-right {
  margin-left: auto; display: flex; align-items: center; gap: 16px;
}
/* Scroll */
.scroll { overflow-y: auto; }

/* Balance Card */
.balance-card {
  margin: 8px 16px;
  background: #0F1420;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}
.balance-top {
  padding: 20px 20px 20px;
  min-height: 152px;
  position: relative; z-index: 1;
}
.balance-nudge {
  position: absolute; top: 18px; right: 18px;
  background: rgba(255,255,255,0.12);
  color: #fff; font-size: 13px; font-weight: 700;
  padding: 7px 14px; border-radius: 20px;
  letter-spacing: -0.3px; white-space: nowrap;
  z-index: 1;
}
.balance-title {
  font-size: 15px; font-weight: 700;
  color: #fff; letter-spacing: -0.3px;
  margin-bottom: 5px;
}
.balance-link {
  font-size: 13px; color: rgba(255,255,255,0.4);
  text-decoration: underline; text-underline-offset: 2px;
  display: block; margin-bottom: 22px;
  letter-spacing: -0.2px; cursor: pointer;
}
.balance-amount {
  display: flex; align-items: baseline; gap: 3px;
}
.balance-num {
  font-size: 34px; font-weight: 800;
  color: #fff; letter-spacing: -1px;
}
.balance-unit {
  font-size: 32px; font-weight: 700;
  color: rgba(255,255,255,0.9);
}
.balance-mascot {
  position: absolute; right: 0px; top: 15px;
  height: 200px; width: auto;
  user-select: none; pointer-events: none;
  z-index: 0;
}
.balance-btns {
  display: flex;
  background: #1C2133;
  border-top: 1px solid rgba(255,255,255,0.07);
  position: relative; z-index: 1;
}
.balance-btn {
  flex: 1; height: 52px;
  background: transparent;
  border: none; border-right: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.85);
  font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  letter-spacing: -0.3px;
}
.balance-btn:last-child { border-right: none; }
/* Section Card */
.section {
  background: var(--surface);
  margin: 0 16px 0;
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
}
.section + .section { margin-top: 8px; }
.section-title {
  font-size: 16px; font-weight: 700;
  color: var(--text-primary); letter-spacing: -0.5px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 2px;
  cursor: pointer;
}
.section-title svg { opacity: 0.5; }
/* Yoddon Row */
.y-row {
  display: flex; align-items: center;
  padding: 13px 0; gap: 12px;
  border-bottom: 1px solid var(--divider);
}
.y-row:last-of-type { border-bottom: none; }
.y-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.y-icon-income { background: var(--green-light); }
.y-icon-expense { background: #F0F0F2; }
.y-icon-card { background: var(--green-light); }
.y-body { flex: 1; min-width: 0; }
.y-amount {
  display: flex; align-items: baseline; gap: 1px;
}
.y-num {
  font-size: 17px; font-weight: 700;
  color: var(--text-primary); letter-spacing: -0.3px;
}
.y-unit { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.y-label {
  font-size: 12px; color: var(--text-secondary);
  letter-spacing: -0.3px; margin-top: 2px;
}
.y-badge-peer {
  display: inline-flex; align-items: center; gap: 2px;
  background: var(--divider); color: var(--text-primary);
  font-size: 13px; font-weight: 600;
  padding: 6px 12px; border-radius: 8px;
  flex-shrink: 0; letter-spacing: -0.3px;
}
/* 불릴까봐 chip */
.invest-chip {
  display: inline-flex; align-items: center; gap: 2px;
  background: var(--divider); color: var(--text-primary);
  font-size: 13px; font-weight: 600;
  padding: 6px 12px; border-radius: 8px;
  flex-shrink: 0; letter-spacing: -0.3px;
  cursor: pointer; border: none;
  font-family: inherit; white-space: nowrap;
}
/* 혜택 button */
.benefit-btn {
  background: var(--divider); border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  padding: 6px 12px; cursor: pointer; font-family: inherit;
  flex-shrink: 0; letter-spacing: -0.3px;
}
/* 살까봐 bar */
.salk-bar {
  margin: 0 0 12px;
  background: linear-gradient(var(--bg), var(--bg)) padding-box,
              linear-gradient(120deg, #8B5CF6, #60A5FA, #03C75A) border-box;
  border-radius: 24px; padding: 9px 12px;
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  border: 1.5px solid transparent;
  transition: opacity 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.03);
}
.salk-bar:active { opacity: 0.7; }
.salk-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #8B5CF6, #60A5FA);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 12px; font-weight: 800; color: #fff;
}
.salk-placeholder {
  flex: 1; font-size: 14px; color: var(--text-tertiary);
  letter-spacing: -0.3px;
}
.salk-send {
  width: 26px; height: 26px; border-radius: 50%;
  background: #1A1A1A;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
/* Friend Row */
.f-row {
  display: flex; align-items: center;
  padding: 9px 0; gap: 12px;
  border-bottom: 1px solid var(--divider);
}
.f-row:last-child { border-bottom: none; }
.f-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; overflow: hidden;
}
.f-info { flex: 1; }
.f-name { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
.f-sub { font-size: 12px; letter-spacing: -0.3px; margin-top: 1px; }
.f-sub-bday { color: var(--green); font-weight: 600; }
.f-sub-gray { color: var(--text-secondary); }
.send-btn {
  background: var(--divider); border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  padding: 7px 14px; cursor: pointer; font-family: inherit;
  flex-shrink: 0; letter-spacing: -0.3px;
}
/* Gap */
.gap8 { height: 8px; }
.gap20 { height: 20px; }
/* Bottom Nav */
.bnb {
  background: var(--surface);
  border-top: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px 16px 0 0;
  padding: 12px 20px 20px;
  display: flex; align-items: center;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
}
.bnb-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; cursor: pointer;
}
.bnb-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.bnb-label { font-size: 10px; font-weight: 500; color: #767678; letter-spacing: -0.3px; }
.bnb-item.active .bnb-label { font-weight: 700; color: #000; }
button { cursor: pointer; }
</style>
</head>
